name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: TurtleneckCoach
  SIGNING_IDENTITY: "Developer ID Application: ILWON YOON (LG7667PAS6)"

jobs:
  build-sign-release:
    name: Build, Sign, Notarize & Release
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dmg_name=${APP_NAME}-${VERSION}.dmg" >> "$GITHUB_OUTPUT"

      - name: Setup temporary keychain
        id: keychain
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/certificate.p12"

          echo "keychain_path=${KEYCHAIN_PATH}" >> "$GITHUB_OUTPUT"

          # Decode certificate
          echo "${DEVELOPER_ID_CERTIFICATE_BASE64}" | base64 --decode > "${CERT_PATH}"

          # Create and configure temporary keychain
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          # Import certificate into keychain
          security import "${CERT_PATH}" \
            -P "${DEVELOPER_ID_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN_PATH}"

          # Prepend temporary keychain to search list
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')

          # Verify the signing identity is available
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          # Clean up cert file
          rm -f "${CERT_PATH}"

      - name: Build and sign app
        run: |
          chmod +x ./scripts/build-release.sh
          ./scripts/build-release.sh "${SIGNING_IDENTITY}"

      - name: Verify code signature
        run: |
          codesign --verify --deep --strict --verbose=2 "./${APP_NAME}.app"
          echo "Code signature verified successfully."

      - name: Create DMG
        run: |
          chmod +x ./scripts/create-dmg.sh
          ./scripts/create-dmg.sh "./${APP_NAME}.app"

          DMG_PATH="./${{ steps.version.outputs.dmg_name }}"
          if [[ ! -f "${DMG_PATH}" ]]; then
            echo "error: expected DMG not found at ${DMG_PATH}" >&2
            echo "Listing available DMGs:"
            ls -la ./*.dmg 2>/dev/null || echo "No DMG files found."
            exit 1
          fi
          echo "DMG created: ${DMG_PATH}"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          chmod +x ./scripts/notarize.sh
          ./scripts/notarize.sh "./${{ steps.version.outputs.dmg_name }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.dmg_name }}
          path: ./${{ steps.version.outputs.dmg_name }}
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./${{ steps.version.outputs.dmg_name }}
          body: |
            ## TurtleneckCoach ${{ steps.version.outputs.version }}

            ### Installation
            1. Download **${{ steps.version.outputs.dmg_name }}** below
            2. Open the DMG and drag **TurtleneckCoach** to your Applications folder
            3. Launch from Applications -- the app runs in your menu bar (no Dock icon)

            ### Requirements
            - macOS 14 (Sonoma) or later
            - Apple Silicon (arm64)
            - Camera access (prompted on first launch)

            ### What's New
            See commit history below for detailed changes.

            ---
            *Signed with Developer ID and notarized by Apple.*

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="${{ steps.keychain.outputs.keychain_path }}"
          if [[ -n "${KEYCHAIN_PATH}" ]] && security list-keychains -d user | grep -q "$(basename "${KEYCHAIN_PATH}")"; then
            security delete-keychain "${KEYCHAIN_PATH}" || true
          fi
